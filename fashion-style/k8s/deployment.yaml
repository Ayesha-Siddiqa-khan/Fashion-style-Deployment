apiVersion: apps/v1
kind: Deployment
metadata:
  name: fashion-style
  namespace: fashion-style
  labels:
    app: fashion-style
spec:
  replicas: 3
  selector:
    matchLabels:
      app: fashion-style
  template:
    metadata:
      labels:
        app: fashion-style
    spec:
      imagePullSecrets:
        - name: ecr-creds
      containers:
        - name: fashion-style
          image: 257536659737.dkr.ecr.us-east-1.amazonaws.com/zeenkaar:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: "0.0.0.0"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
